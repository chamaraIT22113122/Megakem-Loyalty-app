<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    
    <!-- Primary Meta Tags -->

    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://megakem-loyalty-app.onrender.com/" />
    <meta property="og:title" content="Megakem Rewards | Premium Construction Chemicals & Loyalty Program" />
    <meta property="og:description" content="Join the Megakem Rewards System. Scan products, track your purchases, earn loyalty points, and redeem them for exclusive cash rewards and prizes." />
    <!-- You can update the image URL to a real hosted image of the logo later -->
    <meta property="og:image" content="https://megakem-loyalty-app.onrender.com/favicon.ico" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://megakem-loyalty-app.onrender.com/" />
    <meta property="twitter:title" content="Megakem Rewards | Premium Construction Chemicals & Loyalty Program" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Megakem Rewards" />
    
    <!-- Optional Canonical URL to prevent duplicate content issues -->
    <link rel="canonical" href="https://megakem-loyalty-app.onrender.com/" />

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Unregister service workers to prevent aggressive caching issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log('Service worker unregistered successfully');
            });
          }
        });
      }
    </script>
  </body>
</html>
